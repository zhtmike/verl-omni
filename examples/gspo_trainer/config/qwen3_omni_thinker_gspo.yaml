# Qwen3-Omni Thinker GSPO + LoRA training config (FSDP + vLLM-Omni AR rollout).
#
# Inherits verl's default ppo_trainer config and overrides the recipe-specific
# fields below. Volatile values (data/model paths, GPU/node counts, the
# vLLM-Omni stage config path) are left to be set via CLI in the run script.
#
# Launch with:
#   python3 -m verl.trainer.main_ppo \
#     --config-path=<this dir> --config-name=qwen3_omni_thinker_gspo <CLI overrides>

hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_trainer
  - _self_

data:
  train_batch_size: 8
  max_prompt_length: 1024
  max_response_length: 8192
  val_max_samples: 1000
  validation_shuffle: true
  filter_overlong_prompts: true
  truncation: left

actor_rollout_ref:

  model:
    override_config:
      attn_implementation: sdpa
    lora_rank: 64
    lora_alpha: 32
    target_modules: all-linear
    exclude_modules: ".*talker.*|.*code2wav.*|.*code_predictor.*|.*visual.*|.*audio_tower.*"
    use_remove_padding: true
    enable_gradient_checkpointing: true

  actor:
    freeze_vision_tower: true
    optim:
      lr: 1e-6
      lr_warmup_steps: 10
      weight_decay: 0.1
      clip_grad: 1.0
    ppo_mini_batch_size: 8
    ppo_micro_batch_size_per_gpu: 2
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    entropy_coeff: 0
    strategy: fsdp
    fsdp_config:
      param_offload: true
      optimizer_offload: true
      model_dtype: bf16
      use_orig_params: true
      wrap_policy:
        min_num_params: 100000000
    policy_loss:
      loss_mode: gspo
    clip_ratio_low: 3e-4
    clip_ratio_high: 4e-4
    loss_agg_mode: seq-mean-token-mean

  rollout:
    name: vllm_omni
    mode: async
    n: 8
    temperature: 0.8
    top_p: 0.9
    top_k: -1
    tensor_model_parallel_size: 4
    # NOTE: engine memory/batching (gpu_memory_utilization, max_num_seqs, dtype,
    # load_format, LoRA, ...) is set in the vLLM-Omni stage config
    # (qwen3_omni_thinker_only.yaml). vLLM-Omni ignores these top-level args when
    # stage_configs_path is set, so they are intentionally not duplicated here.
    calculate_log_probs: true
    load_format: safetensors
    layered_summon: true
    log_prob_micro_batch_size_per_gpu: 4
    engine_kwargs:
      vllm_omni:
        output_mode: ar

  ref:
    log_prob_micro_batch_size_per_gpu: 4
    strategy: fsdp
    fsdp_config:
      param_offload: true
      model_dtype: bf16
      use_orig_params: true
      wrap_policy:
        min_num_params: 100000000

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: false

reward:
  reward_manager:
    name: dapo

trainer:
  val_before_train: false
  critic_warmup: 0
  logger: ["console", "wandb"]
  project_name: qwen3_omni_thinker_rl
  experiment_name: gspo_lora_math
  nnodes: 1
  save_freq: 20
  test_freq: 25
  total_epochs: 5
