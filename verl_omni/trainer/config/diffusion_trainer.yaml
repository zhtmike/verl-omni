# Format checks enforced on CI:
# 1. Comments must appear above each field.
# 2. There must be a blank line between each field.
# 3. Inline comments (after a field on the same line) are not allowed.
# 4. Indentation level is respected for nested fields.

# specify the default per-component configs
defaults:

  - diffusion/model_engine: dp_diffusion

  # <folder_name>@<field_name>.<field_name>: <yaml_file_name>
  # actor_rollout_ref.actor: trainer/config/diffusion/actor/dp_diffusion_actor.yaml
  - diffusion/actor@actor_rollout_ref.actor: ${diffusion/model_engine}_actor

  # data: trainer/config/data/legacy_data.yaml
  - data@data: legacy_data

  # Reference model config.
  # Reference model will be enabled when actor.use_kl_loss is True.
  - diffusion/ref@actor_rollout_ref.ref: ${diffusion/model_engine}_ref

  # Rollout model config.
  - diffusion/rollout@actor_rollout_ref.rollout: diffusion_rollout

  # Model config.
  - diffusion/model@actor_rollout_ref.model: diffusion_model

  # Reward config.
  - reward@reward: reward

  # load the reference default config, then apply the fields in the current yaml
  # self config override anything above
  - _self_

# config for actor, rollout and reference model
actor_rollout_ref:

  # Whether it's a hybrid engine, currently only supports hybrid engine
  hybrid_engine: true

  # Timeout for operations executed against the process group
  nccl_timeout: 600

  # Model config
  model:

    # Select diffusion agent loop and DiffusionModelConfig
    model_type: "diffusion_model"

# config for the algorithm
algorithm:

  # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
  _target_: verl_omni.trainer.config.DiffusionAlgoConfig

  # Advantage estimator type: "flow_grpo"
  adv_estimator: flow_grpo

  # Whether to normalize advantages by std (specific to GRPO)
  norm_adv_by_std_in_grpo: True

  # Whether to bypass old log-prob recomputation by reusing rollout log-probs
  bypass_mode: False

  # Whether to normalize advantages using global standard deviation
  global_std: True

# config for the trainer
trainer:

  # Number of epochs in training
  total_epochs: 30

  # Total training steps (can be set explicitly or derived from epochs)
  total_training_steps: null

  # Project name for experiment tracking (e.g., wandb)
  project_name: verl_examples

  # Experiment name for run identification in tracking tools (diffusion / FlowGRPO examples)
  experiment_name: ocr

  # Logging backends to use: "console", "wandb", etc.
  logger: ["console", "wandb"]

  # Number of generations to log during validation
  log_val_generations: 0

  # Directory for logging rollout data; no dump if null
  rollout_data_dir: null

  # Directory for logging validation data; no dump if null
  validation_data_dir: null

  # Number of nodes used in the training
  nnodes: 1

  # Number of GPUs per node
  n_gpus_per_node: 8

  # Save frequency (by iteration) for model checkpoints
  save_freq: -1

  # ESI refers to the elastic server instance used during training, similar to the training plan. For example,
  # if you purchase 10 hours of computing power, the ESI will automatically shut down after 10 hours of training.
  # To ensure a checkpoint is saved before ESI shuts down, the system will start saving a checkpoint in advance.
  # The advance time is calculated as: Advance Time = Longest historical step duration + Checkpoint save duration + esi_redundant_time.
  # Here, esi_redundant_time is a user-defined value that further extends the advance time for added safety.
  esi_redundant_time: 0

  # Resume mode: "auto", "disable", or "resume_path"
  # "auto": resume from last checkpoint if available
  # "disable": start from scratch
  # "resume_path": resume from a user-defined path
  resume_mode: auto

  # Path to resume training from (only used when resume_mode is "resume_path")
  resume_from_path: null

  # Whether to run validation before training begins
  val_before_train: True

  # Whether to run validation only
  val_only: False

  # Validation frequency (in training iterations)
  test_freq: -1

  # Default path to distributed filesystem for saving checkpoints
  default_hdfs_dir: null

  # Whether to delete local checkpoints after loading
  del_local_ckpt_after_load: False

  # Default local directory for saving checkpoints
  default_local_dir: checkpoints/${trainer.project_name}/${trainer.experiment_name}

  # Maximum number of actor checkpoints to keep
  max_actor_ckpt_to_keep: null

  # Timeout (in seconds) for Ray worker to wait for registration
  ray_wait_register_center_timeout: 300

  # Device to run training on (e.g., "cuda", "cpu")
  device: cuda

# Profiler configs (mirrors verl/trainer/config/ppo_trainer.yaml `global_profiler`).
# verl-omni does not support NPU; only nsys, torch and torch_memory tools are supported.
global_profiler:

  # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
  _target_: verl.utils.profiler.ProfilerConfig

  # Profiling tool: choose between nsys, torch, torch_memory
  tool: null

  # Steps at which profiling should be performed (e.g. [1, 2, 5]). null disables profiling.
  steps: null

  # Whether to combine continuous steps into one database.
  # If True, worker.profiler.discrete must be False, [1,2] in one db, [5] in another.
  # If False, [1] in one, [2] in another, [5] in another.
  profile_continuous_steps: False

  # Path to save profiling contents
  save_path: "outputs/profile"

  # Tool-specific global configurations.
  # Override on the CLI via +global_profiler.global_tool_config.[tool].xxx=yyy
  global_tool_config:

    # NVIDIA Nsight Systems config
    nsys:

      # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
      _target_: verl.utils.profiler.config.NsightToolConfig

      # True for each task has its own database, False for all tasks in one training step share one database.
      discrete: False

      # Controller-side Nsight Systems options. Must be set when global_profiler.steps is not null
      # and global_profiler.tool == "nsys".
      # See https://docs.nvidia.com/nsight-systems/UserGuide/index.html
      controller_nsight_options:

        # Select the API(s) to be traced.
        trace: "cuda,nvtx,cublas,ucx"

        # Track GPU memory usage by CUDA kernels. Must be string "true" or "false".
        cuda-memory-usage: "true"

        # CUDA graphs will be traced as a whole.
        cuda-graph-trace: "graph"

      # Worker-side Nsight Systems options. Must be set when using nsys with profile steps.
      worker_nsight_options:

        # Select the API(s) to be traced.
        trace: "cuda,nvtx,cublas,ucx"

        # Track GPU memory usage by CUDA kernels. Must be string "true" or "false".
        cuda-memory-usage: "true"

        # CUDA graphs will be traced as a whole.
        cuda-graph-trace: "graph"

        # Profiling only in a range of torch.cuda.profiler.start and stop. Do not change.
        capture-range: "cudaProfilerApi"

        # Specify desired behavior when a capture range ends.
        # Valid values: "repeat-shutdown:n" or null.
        capture-range-end: null

        # Send signal to the target application's process group. Let the program exit by itself.
        kill: none

    # Torch CUDA memory snapshot dumping
    torch_memory:

      # Maximum number of allocation entries to record
      trace_alloc_max_entries: 100_000

      # Depth of the call stack to capture for each allocation
      stack_depth: 32

      # 'alloc': allocations only | 'state': state changes only | 'all': both.
      context: "all"

      # 'python': Python stacks | 'cpp': C++ stacks | 'all': both.
      stacks: "all"

      # Extra keyword arguments forwarded to torch.cuda.memory._record_memory_history.
      kw_args: {}

# configs related to ray
ray_kwargs:

  # configs related to ray initialization
  ray_init:

    # Number of CPUs for Ray. Use a fixed number instead of null when using SLURM.
    num_cpus: null

  # Path to save Ray timeline JSON for performance profiling
  timeline_json_file: null
