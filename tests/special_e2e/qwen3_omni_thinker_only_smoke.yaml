# 2-GPU Thinker-only stage config for the Qwen3-Omni GSPO smoke test.
#
# Uses 2 GPUs (tensor_parallel_size 2, devices "0,1") so FSDP shards the actor
# (FULL_SHARD) instead of falling into the single-GPU NO_SHARD path, which does
# not support the offload_to_cpu summon used during LoRA weight sync.
# vLLM-Omni strips the top-level CLI engine args when a stage config is provided,
# so memory/batching live here.
stage_args:
  - stage_id: 0
    runtime:
      devices: "0,1"
    engine_args:
      # ── Stage identity ──
      model_stage: thinker
      model_arch: Qwen3OmniMoeThinkerForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      engine_output_type: text
      hf_config_name: thinker_config

      # ── Parallelism & backend ──
      tensor_parallel_size: 2
      distributed_executor_backend: "mp"

      # ── Text-only smoke test: allow no multimodal inputs so vLLM skips the
      #    dummy image/video/audio profiling forward (the tiny vision tower is
      #    not dimensionally exercised; text generation never touches it). ──
      limit_mm_per_prompt:
        image: 0
        video: 0
        audio: 0

      # ── Memory & batching (top-level CLI args are stripped) ──
      gpu_memory_utilization: 0.4
      max_num_seqs: 16
      max_num_batched_tokens: 8192
      enable_chunked_prefill: true

      # ── Model loading ──
      dtype: bfloat16
      load_format: safetensors
      trust_remote_code: true
      enable_prefix_caching: false
      enforce_eager: true

      # ── LoRA (required for adapter hot-loading) ──
      enable_lora: true
      max_lora_rank: 64
      max_loras: 1

      # ── verl integration ──
      enable_sleep_mode: true
      logprobs_mode: processed_logprobs
      disable_log_stats: true
    final_output: true
    final_output_type: text
    is_comprehension: true
